version: '3.8'

services:
  backend:
    build: .
    container_name: deadlock_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./deadlock.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - deadlock_data:/app/data
      - deadlock_logs:/app/logs
    restart: unless-stopped

  frontend:
    build: .
    container_name: deadlock_frontend
    command: streamlit run src/presentation/web/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  deadlock_data:
  deadlock_logs:
